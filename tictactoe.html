<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 1.8rem;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    #resetBtn { background: #e94560; color: #fff; }

    #modeBtn {
      background: #0f3460;
      color: #a8dadc;
      border: 1px solid #a8dadc;
    }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 32px;
      font-size: 1rem;
      color: #888;
    }

    #score span { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    #score b { font-size: 1.5rem; color: #eee; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status"></div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="controls">
    <button id="modeBtn">vs CPU</button>
    <button id="resetBtn">New Game</button>
  </div>

  <div id="score">
    <span>X <b id="xScore">0</b></span>
    <span>Draws <b id="dScore">0</b></span>
    <span>O <b id="oScore">0</b></span>
  </div>

  <script>
    const cells      = document.querySelectorAll('.cell');
    const statusEl   = document.getElementById('status');
    const resetBtn   = document.getElementById('resetBtn');
    const modeBtn    = document.getElementById('modeBtn');
    const xScoreEl   = document.getElementById('xScore');
    const oScoreEl   = document.getElementById('oScore');
    const dScoreEl   = document.getElementById('dScore');

    const WIN_LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver;
    let vsCPU = false;
    let scores = { X: 0, O: 0, D: 0 };

    function newGame() {
      board    = Array(9).fill('');
      current  = 'X';
      gameOver = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      setStatus("X's turn");
    }

    function setStatus(msg) { statusEl.textContent = msg; }

    function updateScores() {
      xScoreEl.textContent = scores.X;
      oScoreEl.textContent = scores.O;
      dScoreEl.textContent = scores.D;
    }

    function checkWin(b, p) {
      return WIN_LINES.find(([a, c, d]) => b[a] === p && b[c] === p && b[d] === p) || null;
    }

    function place(i, player) {
      board[i] = player;
      cells[i].textContent = player;
      cells[i].classList.add(player.toLowerCase(), 'taken');
    }

    function afterMove() {
      const win = checkWin(board, current);
      if (win) {
        win.forEach(i => cells[i].classList.add('win'));
        setStatus(`${current} wins!`);
        scores[current]++;
        updateScores();
        gameOver = true;
        return;
      }
      if (board.every(c => c)) {
        setStatus("It's a draw!");
        scores.D++;
        updateScores();
        gameOver = true;
        return;
      }
      current = current === 'X' ? 'O' : 'X';
      setStatus(`${current}'s turn`);
      if (vsCPU && current === 'O') setTimeout(cpuMove, 380);
    }

    function onCellClick(i) {
      if (gameOver || board[i]) return;
      if (vsCPU && current === 'O') return;
      place(i, current);
      afterMove();
    }

    // CPU: tries to win, blocks X, then prefers center/corners/sides
    function cpuMove() {
      if (gameOver) return;
      const move = pickMove();
      place(move, 'O');
      afterMove();
    }

    function pickMove() {
      for (const p of ['O', 'X']) {
        for (let i = 0; i < 9; i++) {
          if (!board[i]) {
            board[i] = p;
            const win = checkWin(board, p);
            board[i] = '';
            if (win) return i;
          }
        }
      }
      const pref = [4, 0, 2, 6, 8, 1, 3, 5, 7];
      return pref.find(i => !board[i]);
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => onCellClick(+cell.dataset.i));
    });

    resetBtn.addEventListener('click', () => newGame());

    modeBtn.addEventListener('click', () => {
      vsCPU = !vsCPU;
      modeBtn.textContent = vsCPU ? 'vs Human' : 'vs CPU';
      newGame();
    });

    newGame();
  </script>
</body>
</html>
